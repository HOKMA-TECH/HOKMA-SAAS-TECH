name: Security SQL Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  security-sql:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        run: supabase start

      - name: Run hardening SQL tests
        run: |
          mkdir -p test-results/sql
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -f supabase/tests/etapa_3_5_security.sql | tee test-results/sql/etapa_3_5_security.log
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -f supabase/tests/etapa_3_5_fixtures.sql | tee test-results/sql/etapa_3_5_fixtures.log
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -f supabase/tests/etapa_3_5_authz_scenarios.sql | tee test-results/sql/etapa_3_5_authz_scenarios.log

      - name: Upload SQL test logs
        uses: actions/upload-artifact@v7
        with:
          name: security-sql-logs
          path: test-results/sql/*.log
