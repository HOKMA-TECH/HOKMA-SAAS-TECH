project_id = "hokma-saas-v2"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public"]
max_rows = 1000

[db]
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["tauri://localhost", "http://localhost:3000/login", "http://localhost:3000/cadastro"]
jwt_expiry = 3600
enable_signup = true
enable_manual_linking = false
minimum_password_length = 12
password_requirements = "lower_upper_letters_digits_symbols"

[storage]
enabled = true
file_size_limit = "50MiB"
